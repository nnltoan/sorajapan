TUMS GROUP
Tập đoàn cung cấp TTS và Tokutei (kỹ năng đặc định) điều dưỡng tại Saitama. Tập trung đào tạo tiếng Nhật và kỹ năng chuyên môn cao.
Địa điểm: Saitama
Website: universal.tums.jp
Card 5 – NICHII GROUP
NICHII GROUP
Một trong những tập đoàn điều dưỡng lớn nhất Nhật Bản, hợp tác lâu năm với Sora Japan trong việc tuyển dụng và đào tạo TTS/Tokutei điều dưỡng.
Địa điểm: Saitama
Website: www.nichiigakkan.co.jp
