<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin CMS | Sora Japan</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <!-- Quill.js Editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="admin-body">

  <!-- ================= LOGIN PAGE ================= -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <img src="images/logo_transparent.png" alt="Sora Japan">
      <h2>Quản trị Tin tức</h2>
      <div id="login-error" class="login-error"></div>
      <input type="password" id="login-password" placeholder="Nhập mật khẩu admin" autocomplete="current-password">
      <button class="admin-btn admin-btn-primary" style="width:100%;padding:12px;font-size:1rem;" onclick="doLogin()">
        Đăng nhập
      </button>
    </div>
  </div>

  <!-- ================= ADMIN APP ================= -->
  <div id="admin-app" style="display:none;">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-left">
        <img src="images/logo_transparent.png" alt="Sora Japan">
        <h1>Admin CMS</h1>
      </div>
      <div class="admin-header-right">
        <a href="tin-tuc.html" target="_blank" class="admin-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Xem trang
        </a>
        <button class="admin-btn" onclick="doLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Đăng xuất
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <a href="#" class="active" data-page="dashboard" onclick="navigateTo('dashboard')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#" data-page="posts" onclick="navigateTo('posts')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Bai viet</span>
        </a>
        <a href="#" data-page="categories" onclick="navigateTo('categories')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Danh muc</span>
        </a>
        <a href="#" data-page="media" onclick="navigateTo('media')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Media</span>
        </a>
        <div class="divider"></div>
        <a href="#" data-page="settings" onclick="navigateTo('settings')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Cai dat</span>
        </a>
        <div class="divider"></div>
        <a href="index.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Trang chu</span>
        </a>
      </aside>

      <!-- Main Content Area -->
      <main class="admin-main" id="admin-content">
        <!-- Content rendered by admin.js -->
      </main>
    </div>
  </div>

  <!-- Quill.js -->
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <!-- DOMPurify -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <!-- App Scripts -->
  <script>
    // Register table-related formats so Quill preserves them on paste
    document.addEventListener('DOMContentLoaded', () => {
      const Block = Quill.import('blots/block');
      const Container = Quill.import('blots/container');
      const Inline = Quill.import('blots/inline');

      class TableCell extends Block {
        static create(value) {
          const node = super.create();
          return node;
        }
      }
      TableCell.blotName = 'table-cell';
      TableCell.tagName = 'TD';

      class TableHeader extends Block {
        static create(value) {
          const node = super.create();
          return node;
        }
      }
      TableHeader.blotName = 'table-header';
      TableHeader.tagName = 'TH';

      class TableRow extends Container {
        static create(value) {
          return super.create();
        }
      }
      TableRow.blotName = 'table-row';
      TableRow.tagName = 'TR';
      TableRow.allowedChildren = [TableCell, TableHeader];

      class TableBody extends Container {
        static create(value) {
          return super.create();
        }
      }
      TableBody.blotName = 'table-body';
      TableBody.tagName = 'TBODY';
      TableBody.allowedChildren = [TableRow];

      class TableHead extends Container {
        static create(value) {
          return super.create();
        }
      }
      TableHead.blotName = 'table-head';
      TableHead.tagName = 'THEAD';
      TableHead.allowedChildren = [TableRow];

      class TableContainer extends Container {
        static create(value) {
          return super.create();
        }
      }
      TableContainer.blotName = 'table-container';
      TableContainer.tagName = 'TABLE';
      TableContainer.allowedChildren = [TableHead, TableBody, TableRow];

      Quill.register(TableCell);
      Quill.register(TableHeader);
      Quill.register(TableRow);
      Quill.register(TableBody);
      Quill.register(TableHead);
      Quill.register(TableContainer);
    });
  </script>
  <script src="js/news-config.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
